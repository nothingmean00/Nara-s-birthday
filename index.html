<html lang="en">
<head>

<title>Happy Birthday Nara! - 25</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #0a0015;
    overflow: hidden;
    height: 100%;
    height: 100dvh;
    width: 100%;
    font-family: 'Poppins', sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  /* Custom cursor — desktop only */
  .cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,210,100,0.8);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s;
    mix-blend-mode: difference;
  }

  @media (pointer: coarse) {
    body { cursor: auto; }
    .cursor { display: none; }
  }
  @media (pointer: fine) {
    body { cursor: none; }
  }

  /* Canvas layers */
  #bgCanvas, #fwCanvas, #sparkleCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #bgCanvas { z-index: 0; }
  #fwCanvas { z-index: 2; }
  #sparkleCanvas { z-index: 50; pointer-events: none; }

  /* Intro overlay */
  .intro {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0015;
    transition: opacity 1s ease;
    padding: 20px;
  }

  .intro.hide {
    opacity: 0;
    pointer-events: none;
  }

  .intro-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    color: #ffd32a;
    opacity: 0;
    animation: introFade 2s ease-in-out 0.5s forwards;
    text-shadow: 0 0 30px rgba(255,211,42,0.5);
    text-align: center;
  }

  @keyframes introFade {
    0% { opacity: 0; transform: scale(0.8); letter-spacing: 0; }
    50% { opacity: 1; transform: scale(1); letter-spacing: 4px; }
    100% { opacity: 0; transform: scale(1.1); letter-spacing: 8px; }
  }

  /* Main content */
  .main {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    transition: opacity 1.5s ease;
    padding: 20px;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  .main.show { opacity: 1; }

  /* Cake */
  .cake-scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 100%;
    margin-bottom: clamp(15px, 3vh, 30px);
    transform: translateY(40px) scale(var(--cake-scale, 1));
    opacity: 0;
    transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cake-scene.show {
    transform: translateY(0) scale(var(--cake-scale, 1));
    opacity: 1;
  }

  .cake {
    position: relative;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
  }

  /* Plate */
  .plate {
    width: 280px;
    height: 18px;
    background: linear-gradient(to bottom, #e8e8e8, #ccc);
    border-radius: 50%;
    margin: -5px auto 0;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .layer {
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  .layer-bottom {
    width: 240px;
    height: 60px;
    background: linear-gradient(180deg, #ff9a56 0%, #ff6b35 50%, #e8552d 100%);
    border-radius: 8px 8px 20px 20px;
    border-top: 3px solid #ffbe76;
  }

  .layer-middle {
    width: 200px;
    height: 55px;
    background: linear-gradient(180deg, #ff80ab 0%, #f06292 50%, #e91e8c 100%);
    margin-bottom: -3px;
    border-radius: 8px;
    border-top: 3px solid #ff80ab;
  }

  .layer-top {
    width: 160px;
    height: 50px;
    background: linear-gradient(180deg, #ba68c8 0%, #9c27b0 50%, #7b1fa2 100%);
    margin-bottom: -3px;
    border-radius: 12px 12px 8px 8px;
    border-top: 3px solid #ce93d8;
  }

  /* Frosting */
  .frosting {
    position: absolute;
    bottom: -8px;
    left: 0;
    right: 0;
    height: 16px;
  }

  .drip {
    position: absolute;
    background: inherit;
    border-radius: 0 0 50% 50%;
    top: 0;
  }

  .layer-top .frosting { background: #e1bee7; }
  .layer-middle .frosting { background: #f8bbd0; }
  .layer-bottom .frosting { background: #ffcc80; }

  .layer-top .frosting .drip { background: #e1bee7; }
  .layer-middle .frosting .drip { background: #f8bbd0; }
  .layer-bottom .frosting .drip { background: #ffcc80; }

  /* Decorative dots */
  .dots {
    position: absolute;
    top: 50%;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-evenly;
    transform: translateY(-50%);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.3); opacity: 1; }
  }

  /* Number candles */
  .number-candles {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: -2px;
    position: relative;
    z-index: 2;
  }

  .num-candle {
    position: relative;
    font-family: 'Poppins', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 6px;
    text-align: center;
  }

  .num-candle.two {
    background: linear-gradient(180deg, #64b5f6, #1e88e5);
    color: #bbdefb;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    box-shadow: 0 4px 10px rgba(30,136,229,0.4);
  }

  .num-candle.five {
    background: linear-gradient(180deg, #ef5350, #c62828);
    color: #ffcdd2;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    box-shadow: 0 4px 10px rgba(198,40,40,0.4);
  }

  /* Flames */
  .flame-wrap {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
  }

  .flame {
    width: 12px;
    height: 18px;
    background: radial-gradient(ellipse at center bottom, #fff 0%, #ffeaa7 30%, #fdcb6e 55%, #e17055 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.15s ease-in-out infinite alternate;
    box-shadow: 0 0 12px 4px rgba(255,234,167,0.7), 0 0 30px 8px rgba(255,200,50,0.3);
    transition: all 0.8s ease;
  }

  .flame.out {
    opacity: 0;
    height: 0;
    box-shadow: none;
  }

  .smoke {
    position: absolute;
    bottom: 100%;
    left: 50%;
    width: 4px;
    height: 0;
    background: rgba(200,200,200,0.4);
    border-radius: 50%;
    opacity: 0;
    filter: blur(2px);
    transition: all 1s ease;
  }

  .smoke.show {
    height: 30px;
    opacity: 0.6;
    transform: translateX(-50%) translateY(-20px);
  }

  @keyframes flicker {
    0% { transform: scale(1) rotate(-4deg); opacity: 0.9; }
    100% { transform: scale(1.08) rotate(4deg); opacity: 1; }
  }

  .glow {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, rgba(255,220,100,0.3), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    transition: opacity 0.8s;
  }

  .glow.out { opacity: 0; }

  /* Blow button */
  .blow-btn {
    display: block;
    margin: 12px auto 0;
    padding: 12px 32px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.7);
    border-radius: 30px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    min-height: 48px;
    min-width: 48px;
  }

  .blow-btn:hover, .blow-btn:active {
    background: rgba(255,255,255,0.2);
    color: #ffd32a;
    border-color: #ffd32a;
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,211,42,0.2);
  }

  .blow-btn.hidden { display: none; }

  /* Text */
  .text-section {
    text-align: center;
    transform: translateY(30px);
    opacity: 0;
    transition: all 1.2s ease 0.4s;
    padding: 0 15px;
    width: 100%;
    max-width: 600px;
  }

  .text-section.show {
    transform: translateY(0);
    opacity: 1;
  }

  .happy {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: transparent;
    background: linear-gradient(90deg, #f8b500, #ff6b9d, #a29bfe, #74b9ff, #f8b500);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    animation: shine 4s linear infinite;
    filter: drop-shadow(0 0 20px rgba(255,180,0,0.3));
    line-height: 1.2;
  }

  .birthday {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: transparent;
    background: linear-gradient(90deg, #74b9ff, #a29bfe, #ff6b9d, #f8b500, #74b9ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    animation: shine 4s linear infinite reverse;
    filter: drop-shadow(0 0 20px rgba(162,155,254,0.3));
    line-height: 1;
  }

  @keyframes shine {
    to { background-position: 200% center; }
  }

  .nara {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(2.8rem, 12vw, 5rem);
    font-weight: 800;
    letter-spacing: clamp(6px, 2vw, 12px);
    text-transform: uppercase;
    margin-top: 5px;
    position: relative;
    display: inline-block;
  }

  .nara span {
    display: inline-block;
    opacity: 0;
    animation: letterPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    background: linear-gradient(180deg, #ffd32a 0%, #ff6348 50%, #ff4757 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 15px rgba(255,99,72,0.4));
  }

  .nara span:nth-child(1) { animation-delay: 2.8s; }
  .nara span:nth-child(2) { animation-delay: 2.95s; }
  .nara span:nth-child(3) { animation-delay: 3.1s; }
  .nara span:nth-child(4) { animation-delay: 3.25s; }

  @keyframes letterPop {
    0% { opacity: 0; transform: translateY(40px) scale(0.3) rotate(-15deg); }
    60% { transform: translateY(-8px) scale(1.1) rotate(3deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  }

  .wishes {
    font-size: clamp(0.8rem, 2.5vw, 1.1rem);
    color: rgba(221,160,221,0.8);
    margin-top: 10px;
    font-weight: 300;
    letter-spacing: 0.5px;
    opacity: 0;
    animation: wishFade 1.5s ease 3.8s forwards;
    line-height: 1.4;
    padding: 0 10px;
  }

  @keyframes wishFade {
    0% { opacity: 0; filter: blur(8px); }
    100% { opacity: 1; filter: blur(0); }
  }

  .age-tag {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 16px;
    border: 1px solid rgba(255,211,42,0.3);
    border-radius: 20px;
    color: rgba(255,211,42,0.7);
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    letter-spacing: clamp(2px, 1vw, 4px);
    opacity: 0;
    animation: wishFade 1s ease 4.2s forwards;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    top: -20px;
    z-index: 20;
    pointer-events: none;
  }

  /* Balloons */
  .balloon {
    position: fixed;
    bottom: -120px;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
  }

  .balloon-body {
    width: 48px;
    height: 60px;
    border-radius: 50%;
    position: relative;
  }

  .balloon-body::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 10px solid currentColor;
  }

  .balloon-string {
    width: 1px;
    height: 80px;
    background: rgba(255,255,255,0.3);
    margin: 0 auto;
  }

  /* Post-blow message */
  .post-blow {
    position: fixed;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    text-align: center;
    opacity: 0;
    transition: all 1s ease;
    pointer-events: none;
    width: 90%;
    max-width: 400px;
  }

  .post-blow.show { opacity: 1; }

  .post-blow p {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.3rem, 5vw, 2rem);
    color: #ffd32a;
    text-shadow: 0 0 30px rgba(255,211,42,0.5);
  }

  /* Touch sparkle burst indicator */
  .touch-burst {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 55;
    animation: burstFade 0.8s ease-out forwards;
  }

  @keyframes burstFade {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }

  /* ===== Small phones (under 380px wide or under 650px tall) ===== */
  @media (max-width: 380px), (max-height: 650px) {
    .cake-scene { --cake-scale: 0.7; margin-bottom: 10px; }
    .happy, .birthday { font-size: clamp(1.6rem, 7vw, 2.5rem); }
    .nara { font-size: clamp(2.2rem, 10vw, 3.5rem); letter-spacing: 4px; }
    .wishes { font-size: 0.75rem; margin-top: 6px; }
    .age-tag { font-size: 0.6rem; padding: 3px 12px; margin-top: 6px; }
    .blow-btn { padding: 10px 24px; font-size: 0.75rem; }
  }

  /* ===== Standard mobile (381-480px) ===== */
  @media (min-width: 381px) and (max-width: 480px) {
    .cake-scene { --cake-scale: 0.8; margin-bottom: 15px; }
  }

  /* ===== Tablets ===== */
  @media (min-width: 481px) and (max-width: 768px) {
    .cake-scene { --cake-scale: 0.9; }
  }

  /* ===== Landscape mobile (keep column layout so “Make a Wish” stays centered, not beside text) ===== */
  @media (max-height: 500px) and (orientation: landscape) {
    .main {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 8px 20px 12px;
      overflow-y: auto;
    }
    .cake-scene { --cake-scale: 0.5; margin-bottom: 0; }
    .text-section { text-align: center; }
    .happy, .birthday { font-size: 1.7rem; }
    .nara { font-size: 2.3rem; letter-spacing: 6px; }
    .wishes { font-size: 0.65rem; }
    .age-tag { font-size: 0.55rem; }
    .blow-btn { padding: 8px 22px; font-size: 0.7rem; min-height: 40px; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="bgCanvas"></canvas>
<canvas id="fwCanvas"></canvas>
<canvas id="sparkleCanvas"></canvas>

<!-- Intro -->
<div class="intro" id="intro">
  <div class="intro-text">A special day for a special someone...</div>
</div>

<!-- Main content -->
<div class="main" id="main">
  <div class="cake-scene" id="cakeScene">
    <div class="cake">
      <div class="number-candles">
        <div class="num-candle two">
          <div class="glow"></div>
          <div class="flame-wrap"><div class="flame"></div><div class="smoke"></div></div>
          2
        </div>
        <div class="num-candle five">
          <div class="glow"></div>
          <div class="flame-wrap"><div class="flame"></div><div class="smoke"></div></div>
          5
        </div>
      </div>
      <div class="layer layer-top">
        <div class="dots">
          <div class="dot" style="background:#e1bee7"></div>
          <div class="dot" style="background:#fff59d; animation-delay:0.3s"></div>
          <div class="dot" style="background:#e1bee7; animation-delay:0.6s"></div>
          <div class="dot" style="background:#fff59d; animation-delay:0.9s"></div>
          <div class="dot" style="background:#e1bee7; animation-delay:1.2s"></div>
        </div>
        <div class="frosting">
          <div class="drip" style="left:15px; width:10px; height:14px;"></div>
          <div class="drip" style="left:45px; width:12px; height:20px;"></div>
          <div class="drip" style="left:95px; width:10px; height:12px;"></div>
          <div class="drip" style="left:130px; width:11px; height:18px;"></div>
        </div>
      </div>
      <div class="layer layer-middle">
        <div class="dots">
          <div class="dot" style="background:#f8bbd0"></div>
          <div class="dot" style="background:#80deea; animation-delay:0.4s"></div>
          <div class="dot" style="background:#f8bbd0; animation-delay:0.8s"></div>
          <div class="dot" style="background:#80deea; animation-delay:1.2s"></div>
          <div class="dot" style="background:#f8bbd0; animation-delay:0.2s"></div>
          <div class="dot" style="background:#80deea; animation-delay:0.6s"></div>
        </div>
        <div class="frosting">
          <div class="drip" style="left:10px; width:11px; height:16px;"></div>
          <div class="drip" style="left:50px; width:13px; height:22px;"></div>
          <div class="drip" style="left:100px; width:10px; height:13px;"></div>
          <div class="drip" style="left:145px; width:12px; height:19px;"></div>
          <div class="drip" style="left:175px; width:10px; height:15px;"></div>
        </div>
      </div>
      <div class="layer layer-bottom">
        <div class="dots">
          <div class="dot" style="background:#ffcc80"></div>
          <div class="dot" style="background:#fff59d; animation-delay:0.3s"></div>
          <div class="dot" style="background:#ffcc80; animation-delay:0.6s"></div>
          <div class="dot" style="background:#fff59d; animation-delay:0.9s"></div>
          <div class="dot" style="background:#ffcc80; animation-delay:1.2s"></div>
          <div class="dot" style="background:#fff59d; animation-delay:0.5s"></div>
          <div class="dot" style="background:#ffcc80; animation-delay:1s"></div>
        </div>
        <div class="frosting">
          <div class="drip" style="left:15px; width:12px; height:18px;"></div>
          <div class="drip" style="left:55px; width:14px; height:24px;"></div>
          <div class="drip" style="left:110px; width:11px; height:14px;"></div>
          <div class="drip" style="left:160px; width:13px; height:21px;"></div>
          <div class="drip" style="left:205px; width:11px; height:16px;"></div>
        </div>
      </div>
      <div class="plate"></div>
    </div>
    <button class="blow-btn" id="blowBtn">Make a Wish</button>
  </div>

  <div class="text-section" id="textSection">
    <div class="happy">Happy</div>
    <div class="birthday">Birthday</div>
    <div class="nara">
      <span>N</span><span>A</span><span>R</span><span>A</span>
    </div>
    <div class="wishes">Here’s to 25 — make it a good one.</div>
    <div class="age-tag">TURNING TWENTY-FIVE</div>
  </div>
</div>

<div class="post-blow" id="postBlow">
  <p>May all your wishes come true!</p>
</div>

<script>
  // ========== DEVICE DETECTION ==========
  const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
  const isLowEnd = isMobile && (navigator.hardwareConcurrency || 4) <= 4;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  // Reduce particle counts on mobile for smooth 60fps
  const STAR_COUNT = isMobile ? 80 : 200;
  const FW_PARTICLES = isMobile ? (isLowEnd ? 20 : 30) : 50;
  const CONFETTI_BURST = isMobile ? (isLowEnd ? 10 : 20) : 30;
  const CONFETTI_ONGOING = isMobile ? 2 : 4;
  const CONFETTI_INTERVAL = isMobile ? 2500 : 1800;
  const BALLOON_INTERVAL = isMobile ? 3500 : 2200;
  const FW_INTERVAL = isMobile ? 4000 : 3000;
  const SPARKLE_PER_MOVE = isMobile ? 1 : 2;

  // ========== CUSTOM CURSOR + SPARKLE TRAIL ==========
  const cursorEl = document.getElementById('cursor');
  const sparkleCanvas = document.getElementById('sparkleCanvas');
  const sCtx = sparkleCanvas.getContext('2d');
  let mouseX = -100, mouseY = -100;
  const sparkles = [];

  function resizeCanvas(c) {
    c.width = c.clientWidth * dpr;
    c.height = c.clientHeight * dpr;
    c.getContext('2d').scale(dpr, dpr);
  }

  function handleResize() {
    [sparkleCanvas, bgCanvas, fwCanvas].forEach(resizeCanvas);
    initStars();
  }

  window.addEventListener('resize', handleResize);
  window.addEventListener('orientationchange', () => setTimeout(handleResize, 200));

  // Desktop mouse
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursorEl.style.left = mouseX - 10 + 'px';
    cursorEl.style.top = mouseY - 10 + 'px';
    addSparkles(mouseX, mouseY, SPARKLE_PER_MOVE);
  });

  // Touch events — sparkle trail on drag + burst on tap
  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    addSparkles(t.clientX, t.clientY, SPARKLE_PER_MOVE);
  }, { passive: true });

  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    // Sparkle burst on tap
    addSparkles(t.clientX, t.clientY, isMobile ? 6 : 10);
    // Visual burst ring
    createTouchBurst(t.clientX, t.clientY);
  }, { passive: true });

  function createTouchBurst(x, y) {
    const colors = ['#ffd32a','#ff6b9d','#a29bfe','#74b9ff'];
    for (let i = 0; i < 4; i++) {
      const dot = document.createElement('div');
      dot.className = 'touch-burst';
      dot.style.left = (x + (Math.random() - 0.5) * 20) + 'px';
      dot.style.top = (y + (Math.random() - 0.5) * 20) + 'px';
      dot.style.background = colors[i];
      dot.style.boxShadow = `0 0 8px ${colors[i]}`;
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 800);
    }
  }

  function addSparkles(x, y, count) {
    for (let i = 0; i < count; i++) {
      sparkles.push({
        x: x + (Math.random() - 0.5) * 10,
        y: y + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5 - 1,
        life: 1,
        size: Math.random() * 3 + 1,
        color: ['#ffd32a','#ff6b9d','#a29bfe','#74b9ff','#fff'][Math.floor(Math.random()*5)]
      });
    }
  }

  function animateSparkles() {
    const w = sparkleCanvas.clientWidth;
    const h = sparkleCanvas.clientHeight;
    sCtx.clearRect(0, 0, w, h);
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const s = sparkles[i];
      s.x += s.vx;
      s.y += s.vy;
      s.life -= 0.025;
      if (s.life <= 0) { sparkles.splice(i, 1); continue; }
      sCtx.save();
      sCtx.globalAlpha = s.life;
      sCtx.fillStyle = s.color;
      sCtx.shadowColor = s.color;
      sCtx.shadowBlur = isMobile ? 4 : 8;
      sCtx.beginPath();
      const r = s.size * s.life;
      for (let j = 0; j < 4; j++) {
        const angle = (Math.PI / 2) * j;
        sCtx.moveTo(s.x, s.y);
        sCtx.lineTo(s.x + Math.cos(angle) * r, s.y + Math.sin(angle) * r);
      }
      sCtx.fill();
      sCtx.restore();
    }
    requestAnimationFrame(animateSparkles);
  }

  // ========== STARFIELD BACKGROUND ==========
  const bgCanvas = document.getElementById('bgCanvas');
  const bgCtx = bgCanvas.getContext('2d');
  const stars = [];

  function initStars() {
    stars.length = 0;
    const w = bgCanvas.clientWidth;
    const h = bgCanvas.clientHeight;
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.005
      });
    }
  }

  function drawStars() {
    const w = bgCanvas.clientWidth;
    const h = bgCanvas.clientHeight;
    bgCtx.clearRect(0, 0, w, h);

    const g = bgCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
    g.addColorStop(0, '#120025');
    g.addColorStop(1, '#0a0015');
    bgCtx.fillStyle = g;
    bgCtx.fillRect(0, 0, w, h);

    stars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
      bgCtx.beginPath();
      bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      bgCtx.fillStyle = `rgba(255,255,255,${alpha})`;
      bgCtx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  // ========== FIREWORKS (Canvas) ==========
  const fwCanvas = document.getElementById('fwCanvas');
  const fwCtx = fwCanvas.getContext('2d');
  const fireworks = [];
  const fwColors = ['#ff6b9d','#ffd32a','#a29bfe','#74b9ff','#ff4757','#2ed573','#ff6348','#1e90ff'];

  class Particle {
    constructor(x, y, color, vel, gravity = 0.04, fade = 0.012) {
      this.x = x; this.y = y;
      this.color = color;
      this.vx = vel.x; this.vy = vel.y;
      this.gravity = gravity;
      this.alpha = 1;
      this.fade = fade;
      this.size = Math.random() * 2 + 1.5;
    }
    update() {
      this.vx *= 0.98;
      this.vy *= 0.98;
      this.vy += this.gravity;
      this.x += this.vx;
      this.y += this.vy;
      this.alpha -= this.fade;
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = Math.max(this.alpha, 0);
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = isMobile ? 6 : 12;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function launchFirework() {
    const w = fwCanvas.clientWidth;
    const h = fwCanvas.clientHeight;
    const x = Math.random() * w * 0.6 + w * 0.2;
    const y = Math.random() * h * 0.35 + h * 0.08;
    const color = fwColors[Math.floor(Math.random() * fwColors.length)];
    for (let i = 0; i < FW_PARTICLES; i++) {
      const angle = (Math.PI * 2 / FW_PARTICLES) * i + Math.random() * 0.3;
      const speed = Math.random() * 3 + 2;
      fireworks.push(new Particle(x, y, color, {
        x: Math.cos(angle) * speed,
        y: Math.sin(angle) * speed
      }));
    }
  }

  function animateFireworks() {
    const w = fwCanvas.clientWidth;
    const h = fwCanvas.clientHeight;
    fwCtx.clearRect(0, 0, w, h);
    for (let i = fireworks.length - 1; i >= 0; i--) {
      fireworks[i].update();
      fireworks[i].draw(fwCtx);
      if (fireworks[i].alpha <= 0) fireworks.splice(i, 1);
    }
    requestAnimationFrame(animateFireworks);
  }

  // ========== CONFETTI ==========
  const confettiPieces = [];
  const confettiColors = ['#ff6b9d','#ffd32a','#a29bfe','#74b9ff','#ff4757','#2ed573','#ff6348','#ffa502','#e056a0'];

  function spawnConfetti(count) {
    count = count || CONFETTI_ONGOING;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const isCircle = Math.random() > 0.5;
      const w = isCircle ? (Math.random() * 8 + 5) : (Math.random() * 10 + 5);
      const h = isCircle ? w : (Math.random() * 5 + 3);
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${w}px; height: ${h}px;
        background: ${confettiColors[Math.floor(Math.random() * confettiColors.length)]};
        border-radius: ${isCircle ? '50%' : '2px'};
        opacity: ${Math.random() * 0.4 + 0.6};
      `;
      document.body.appendChild(el);
      const speed = Math.random() * 2 + 1.5;
      const spin = (Math.random() - 0.5) * 10;
      const wobble = Math.random() * 4 + 2;
      confettiPieces.push({ el, y: -20, speed, spin, angle: 0, wobble, wobbleOffset: Math.random() * Math.PI * 2 });
    }
  }

  function animateConfetti() {
    for (let i = confettiPieces.length - 1; i >= 0; i--) {
      const c = confettiPieces[i];
      c.y += c.speed;
      c.angle += c.spin;
      c.wobbleOffset += 0.05;
      const wobX = Math.sin(c.wobbleOffset) * c.wobble;
      c.el.style.transform = `translateY(${c.y}px) translateX(${wobX}px) rotate(${c.angle}deg)`;
      if (c.y > window.innerHeight + 30) {
        c.el.remove();
        confettiPieces.splice(i, 1);
      }
    }
    requestAnimationFrame(animateConfetti);
  }

  // ========== BALLOONS ==========
  function spawnBalloon() {
    const colors = ['#ff6b9d','#ffd32a','#a29bfe','#74b9ff','#2ed573','#ff4757','#e056a0'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.innerHTML = `
      <div class="balloon-body" style="background: radial-gradient(circle at 35% 30%, ${color}ff, ${color}aa); color: ${color};"></div>
      <div class="balloon-string"></div>
    `;
    balloon.style.left = Math.random() * 90 + 5 + '%';
    const size = Math.random() * 0.3 + (isMobile ? 0.65 : 0.85);
    balloon.style.transform = `scale(${size})`;
    document.body.appendChild(balloon);

    let y = 0;
    const speed = Math.random() * 1 + 0.8;
    const sway = Math.random() * 30 + 15;
    const swaySpeed = Math.random() * 0.015 + 0.01;
    let t = Math.random() * Math.PI * 2;
    balloon.style.opacity = '0.85';

    function rise() {
      y += speed;
      t += swaySpeed;
      balloon.style.transform = `scale(${size}) translateY(-${y}px) translateX(${Math.sin(t) * sway}px)`;
      if (y < window.innerHeight + 200) {
        requestAnimationFrame(rise);
      } else {
        balloon.remove();
      }
    }
    requestAnimationFrame(rise);
  }

  // ========== BLOW OUT CANDLES ==========
  let candlesLit = true;
  document.getElementById('blowBtn').addEventListener('click', () => {
    if (!candlesLit) return;
    candlesLit = false;

    document.querySelectorAll('.flame').forEach((f, i) => {
      setTimeout(() => f.classList.add('out'), i * 200);
    });
    document.querySelectorAll('.glow').forEach((g, i) => {
      setTimeout(() => g.classList.add('out'), i * 200);
    });
    document.querySelectorAll('.smoke').forEach((s, i) => {
      setTimeout(() => s.classList.add('show'), i * 200 + 300);
    });

    document.getElementById('blowBtn').classList.add('hidden');

    // Big celebration burst
    setTimeout(() => {
      const burstFW = isMobile ? 5 : 8;
      const burstConfetti = isMobile ? 25 : 50;
      for (let i = 0; i < burstFW; i++) setTimeout(launchFirework, i * 150);
      spawnConfetti(burstConfetti);
      document.getElementById('postBlow').classList.add('show');
    }, 800);
  });

  // ========== SEQUENCE ==========
  function init() {
    handleResize();
    drawStars();
    animateFireworks();
    animateSparkles();
    animateConfetti();

    // Intro -> Main reveal
    setTimeout(() => {
      document.getElementById('intro').classList.add('hide');
    }, 3200);

    setTimeout(() => {
      const main = document.getElementById('main');
      main.classList.add('show');
      document.getElementById('cakeScene').classList.add('show');
      document.getElementById('textSection').classList.add('show');

      // Initial celebration
      setTimeout(() => {
        const initFW = isMobile ? 3 : 5;
        for (let i = 0; i < initFW; i++) setTimeout(launchFirework, i * 300);
        spawnConfetti(CONFETTI_BURST);
      }, 500);

      // Ongoing effects
      setInterval(() => spawnConfetti(CONFETTI_ONGOING), CONFETTI_INTERVAL);
      setInterval(spawnBalloon, BALLOON_INTERVAL);
      setInterval(launchFirework, FW_INTERVAL);
    }, 3800);
  }

  init();
</script>
</body>
</html>
